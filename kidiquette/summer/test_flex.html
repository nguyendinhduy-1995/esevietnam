<!DOCTYPE html>
<html>
<head>
<style>
.box {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid red;
  height: 100px;
  width: 200px;
  text-align: center;
}
.box-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid blue;
  height: 100px;
  width: 200px;
  text-align: center;
}
.box-block {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid green;
  height: 100px;
  width: 200px;
  text-align: center;
}
</style>
</head>
<body>
  <div class="box">Biết chào hỏi<br>đúng mực</div>
  <div class="box-col">Biết chào hỏi<br>đúng mực</div>
  <div class="box-block"><span>Biết chào hỏi<br>đúng mực</span></div>
</body>
</html>
